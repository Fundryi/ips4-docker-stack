services:
  db-init:
    image: busybox
    command: sh -c "chown -R 999:999 /data && sleep infinity"
    volumes:
      - ${DATA_DIR:-/srv/docker-data/ips4}/mysql:/data
    restart: unless-stopped

  db:
    build: ./mysql
    depends_on:
      db-init:
        condition: service_started
    environment:
      MYSQL_DATABASE: ips
      MYSQL_USER: ips
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ${DATA_DIR:-/srv/docker-data/ips4}/mysql:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ips-network

  redis-init:
    image: busybox
    command: sh -c "chown -R 999:999 /data && sleep infinity"
    volumes:
      - ${DATA_DIR:-/srv/docker-data/ips4}/redis:/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    depends_on:
      redis-init:
        condition: service_started
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ${DATA_DIR:-/srv/docker-data/ips4}/redis:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ips-network

  web-init:
    image: busybox
    command:
      - sh
      - -c
      - |
        if [ ! -f /data/index.html ]; then
          cp /seed/* /data/
          echo "web-init: seeded placeholder files"
        else
          echo "web-init: files already exist, skipping"
        fi
        sleep infinity
    volumes:
      - ${DATA_DIR:-/srv/docker-data/ips4}/ips:/data
      - ./data/ips:/seed:ro
    restart: unless-stopped

  php:
    build: ./php
    volumes:
      - ${DATA_DIR:-/srv/docker-data/ips4}/ips:/var/www/html
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/status SCRIPT_FILENAME=/status REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ips-network

  # HTTP-only nginx (enable with COMPOSE_PROFILES=http)
  nginx:
    image: nginx:stable-alpine
    depends_on:
      php:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ${DATA_DIR:-/srv/docker-data/ips4}/ips:/var/www/html:ro
      - ${DATA_DIR:-/srv/docker-data/ips4}/certbot/www:/var/www/certbot:ro
      - ./nginx/http.conf:/etc/nginx/conf.d/default.conf:ro
      - ${DATA_DIR:-/srv/docker-data/ips4}/logs/nginx:/var/log/nginx
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ips-network
    profiles:
      - http

  # HTTPS nginx (enable with --profile https)
  nginx-https:
    image: nginx:stable-alpine
    depends_on:
      php:
        condition: service_healthy
    environment:
      - DOMAIN=${DOMAIN}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ${DATA_DIR:-/srv/docker-data/ips4}/ips:/var/www/html:ro
      - ${DATA_DIR:-/srv/docker-data/ips4}/ssl:/etc/nginx/ssl:ro
      - ${DATA_DIR:-/srv/docker-data/ips4}/certbot/www:/var/www/certbot:ro
      - ./nginx/https.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ${DATA_DIR:-/srv/docker-data/ips4}/logs/nginx:/var/log/nginx
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ips-network
    profiles:
      - https

  # Certbot for automatic SSL renewal (enable with --profile https)
  # Uses DNS challenge if CLOUDFLARE_API_TOKEN is set, otherwise HTTP challenge
  certbot:
    image: certbot/dns-cloudflare:latest
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
    volumes:
      - ${DATA_DIR:-/srv/docker-data/ips4}/ssl:/etc/letsencrypt
      - ${DATA_DIR:-/srv/docker-data/ips4}/certbot/www:/var/www/certbot
      - ${DATA_DIR:-/srv/docker-data/ips4}/certbot/logs:/var/log/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do if [ -n \"$$CLOUDFLARE_API_TOKEN\" ]; then certbot renew --dns-cloudflare --dns-cloudflare-credentials /etc/letsencrypt/cloudflare.ini; else certbot renew --webroot -w /var/www/certbot; fi; sleep 24h & wait $${!}; done;'"
    restart: unless-stopped
    depends_on:
      - nginx-https
    networks:
      - ips-network
    profiles:
      - https

  # Nginx reload scheduler - reloads nginx daily to pick up renewed certificates
  nginx-reload:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 24h; docker kill --signal=HUP $$(docker ps -q -f name=nginx-https) 2>/dev/null || true; done;'"
    restart: unless-stopped
    profiles:
      - https

  # Automated database backups (enable with --profile backup)
  # Runs on start then on schedule. All settings configurable via env.
  db-backup:
    build:
      context: ./docker/db-backup
    environment:
      DB_HOST: db
      DB_USER: ips
      DB_PASS: ${MYSQL_PASSWORD}
      DB_NAME: ips
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-1}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ${DATA_DIR:-/srv/docker-data/ips4}/backups/mysql:/backups
    restart: unless-stopped
    networks:
      - ips-network
    profiles:
      - backup

  # IPS4 task scheduler cron (enable with --profile cron)
  # Set IPS_TASK_KEY in .env to the key shown in ACP > Advanced Configuration > Tasks
  cron:
    build: ./php
    volumes:
      - ${DATA_DIR:-/srv/docker-data/ips4}/ips:/var/www/html
    depends_on:
      php:
        condition: service_healthy
    environment:
      IPS_TASK_KEY: ${IPS_TASK_KEY:-}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        if [ -z "$$IPS_TASK_KEY" ]; then
          echo "cron: IPS_TASK_KEY is not set. Copy the key from ACP > Advanced Configuration > Tasks into .env"
          exit 1
        fi
        echo "cron: waiting for DB..."
        until php -r "require '/var/www/html/conf_global.php'; new mysqli(\$$INFO['sql_host'], \$$INFO['sql_user'], \$$INFO['sql_pass'], \$$INFO['sql_database'], \$$INFO['sql_port']);" 2>/dev/null; do
          sleep 5
        done
        echo "cron: DB ready. IPS task scheduler running every 60s"
        while true; do
          /usr/local/bin/php -d memory_limit=-1 -d max_execution_time=0 /var/www/html/applications/core/interface/task/task.php "$$IPS_TASK_KEY" 2>&1
          sleep 60
        done
    restart: unless-stopped
    networks:
      - ips-network
    profiles:
      - cron

  # Cloudflare Tunnel for external access without open ports (enable with --profile tunnel)
  # Auto-provisions a named tunnel on first boot if CF_API_TOKEN is set.
  # Priority: TUNNEL_TOKEN (direct) > CF_API_TOKEN (auto-provision) > quick tunnel (random URL).
  cloudflared:
    build:
      context: ./docker/cloudflared
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
      CF_API_TOKEN: ${CLOUDFLARE_TUNNEL_API_TOKEN:-}
      CF_TUNNEL_NAME: ${CLOUDFLARE_TUNNEL_NAME:-ips4}
      CF_SUBDOMAIN: ${CLOUDFLARE_TUNNEL_SUBDOMAIN:-}
      CF_ZONE: ${CLOUDFLARE_TUNNEL_ZONE:-}
      CF_EXTRA_ROUTES: ${CLOUDFLARE_TUNNEL_EXTRA_ROUTES:-}
      CF_ORIGIN_HOST: ${CLOUDFLARE_TUNNEL_ORIGIN_HOST:-}
    depends_on:
      nginx:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ips-network
    profiles:
      - tunnel

  # Cloudflare Development Mode auto-enabler (enable with --profile tunnel-devmode)
  # Polls every 2 minutes; re-enables dev mode when Cloudflare auto-disables it (3h expiry).
  # Useful for debugging — bypasses Cloudflare caching. Not recommended for normal production use.
  cf-devmode:
    image: alpine:3.21
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl >/dev/null 2>&1
        TOKEN="$${CF_DEVMODE_API_TOKEN:-$$CF_API_TOKEN}"
        if [ -z "$$TOKEN" ] || [ -z "$$CF_ZONE_ID" ]; then
          echo "cf-devmode: CF_DEVMODE_ZONE_ID or API token not set. Exiting."
          exit 1
        fi
        API="https://api.cloudflare.com/client/v4/zones/$$CF_ZONE_ID/settings/development_mode"
        echo "cf-devmode: watching zone $$CF_ZONE_ID every 120s"
        while true; do
          STATUS=$$(curl -sf -H "Authorization: Bearer $$TOKEN" "$$API" | sed -n 's/.*"value":"\([^"]*\)".*/\1/p')
          if [ "$$STATUS" = "off" ]; then
            echo "cf-devmode: dev mode is OFF — re-enabling..."
            RESULT=$$(curl -sf -X PATCH -H "Authorization: Bearer $$TOKEN" -H "Content-Type: application/json" -d '{"value":"on"}' "$$API" | sed -n 's/.*"success":\([a-z]*\).*/\1/p')
            if [ "$$RESULT" = "true" ]; then
              echo "cf-devmode: dev mode re-enabled (expires in 3h)"
            else
              echo "cf-devmode: ERROR — failed to enable dev mode. Check API token permissions (needs Zone:Settings:Edit)."
            fi
          elif [ "$$STATUS" = "on" ]; then
            : # already on, nothing to do
          else
            echo "cf-devmode: WARNING — unexpected status '$$STATUS'. Check zone ID / token."
          fi
          sleep 120
        done
    environment:
      CF_DEVMODE_API_TOKEN: ${CF_DEVMODE_API_TOKEN:-}
      CF_API_TOKEN: ${CLOUDFLARE_TUNNEL_API_TOKEN:-}
      CF_ZONE_ID: ${CF_DEVMODE_ZONE_ID:-}
    restart: unless-stopped
    profiles:
      - tunnel-devmode

networks:
  ips-network:
    driver: bridge
